name: Deploy Discord Dashboard

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST || vars.VPS_HOST || '51.210.244.46' }}
      VPS_USER: ${{ secrets.VPS_USER || vars.VPS_USER || 'debian' }}
      VPS_PORT: ${{ secrets.VPS_PORT || vars.VPS_PORT || '2222' }}
      VPS_APP_DIR: ${{ vars.VPS_APP_DIR || '/home/debian/apps/discord' }}
      VPS_COMPOSE_PROJECT: ${{ vars.VPS_COMPOSE_PROJECT || 'discord-dashboard' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deployment settings
        run: |
          test -n "${{ secrets.VPS_SSH_KEY }}" || { echo "::error::Missing VPS_SSH_KEY secret."; exit 1; }

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ env.VPS_PORT }}
          script: |
            set -e

            APP_DIR=${{ env.VPS_APP_DIR }}
            PROJECT=${{ env.VPS_COMPOSE_PROJECT }}
            REPO_URL=https://github.com/${{ github.repository }}.git
            FETCH_URL=https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ -d .git ]; then
              [ -f backend/.env ] && cp backend/.env /tmp/discord-backend-env || true
              git fetch "$FETCH_URL" main
              git reset --hard FETCH_HEAD
              git clean -fd -e backend/.env
              [ -f /tmp/discord-backend-env ] && mkdir -p backend && cp /tmp/discord-backend-env backend/.env || true
            else
              git init
              git remote add origin "$REPO_URL"
              git fetch "$FETCH_URL" main
              git checkout -B main FETCH_HEAD
            fi

            docker compose -p "$PROJECT" down || true
            docker compose -p "$PROJECT" up -d --build
            docker compose -p "$PROJECT" ps
