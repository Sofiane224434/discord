name: Deploy Discord Dashboard

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            APP_DIR=${{ vars.VPS_APP_DIR }}
            PROJECT=${{ vars.VPS_COMPOSE_PROJECT }}
            REPO_URL=https://github.com/${{ github.repository }}.git
            FETCH_URL=https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ -d .git ]; then
              [ -f backend/.env ] && cp backend/.env /tmp/discord-backend-env || true
              git fetch "$FETCH_URL" main
              git reset --hard FETCH_HEAD
              git clean -fd -e backend/.env
              [ -f /tmp/discord-backend-env ] && mkdir -p backend && cp /tmp/discord-backend-env backend/.env || true
            else
              git init
              git remote add origin "$REPO_URL"
              git fetch "$FETCH_URL" main
              git checkout -B main FETCH_HEAD
            fi

            docker compose -p "$PROJECT" down || true
            docker compose -p "$PROJECT" up -d --build
            docker compose -p "$PROJECT" ps
